<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#102B2C"/>
      <stop offset="50%" stop-color="#1F4D4F"/>
      <stop offset="100%" stop-color="#3B6C74"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8C8"/>
      <stop offset="100%" stop-color="#A8DEDE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Left taller building -->
  <rect x="120" y="100" width="120" height="306" rx="10" fill="white"/>
  <!-- Left building windows -->
  <rect x="140" y="128" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="190" y="128" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="140" y="176" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="190" y="176" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="140" y="224" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="190" y="224" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="140" y="272" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="190" y="272" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <!-- Left door -->
  <rect x="160" y="348" width="40" height="58" rx="6" fill="#102B2C" opacity="0.25"/>

  <!-- Right shorter building -->
  <rect x="272" y="172" width="120" height="234" rx="10" fill="white"/>
  <!-- Right building windows -->
  <rect x="292" y="200" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="342" y="200" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="292" y="248" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="342" y="248" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="292" y="296" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <rect x="342" y="296" width="30" height="28" rx="5" fill="#102B2C" opacity="0.25"/>
  <!-- Right door -->
  <rect x="312" y="348" width="40" height="58" rx="6" fill="#102B2C" opacity="0.25"/>

  <!-- Connecting bridge between buildings -->
  <rect x="240" y="236" width="32" height="16" rx="5" fill="url(#link)"/>

  <!-- Link arc at bottom connecting both buildings -->
  <path d="M180 406 Q256 446 332 406" stroke="url(#link)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Small roof accents -->
  <rect x="155" y="90" width="50" height="16" rx="4" fill="white" opacity="0.9"/>
  <rect x="307" y="162" width="50" height="16" rx="4" fill="white" opacity="0.9"/>
</svg>
